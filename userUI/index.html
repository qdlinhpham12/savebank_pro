<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveBank Pro - Đăng nhập</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="app-title">SaveBank Pro</h1>
                <p class="app-subtitle">Hệ thống quản lý sổ tiết kiệm</p>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <form id="loginForm" class="login-form">
                <input type="text" id="username" class="form-input" placeholder="Tên đăng nhập" required>
                <input type="password" id="password" class="form-input" placeholder="Mật khẩu" required>
                <button type="submit" id="loginBtn" class="login-btn">Đăng nhập</button>
            </form>

            <div class="login-options">
                <a href="#" id="forgotLink">Quên mật khẩu?</a>
            </div>

            <footer class="login-footer">
                &copy; 2024 SaveBank Pro. All rights reserved.
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
